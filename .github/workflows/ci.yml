name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run if a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Eval (no-LLM unit layers only)
        # The first two layers of scripts/eval-harness.ts run without network
        # access — they validate that computeVerdict() returns the right
        # verdict for known gold cases and that the jurisdiction-leak
        # validator catches hallucinations. Without these in CI, any change
        # to the grounded renderer's verdict logic ships unverified.
        # GEMINI_API_KEY is intentionally unset so the integration layer
        # short-circuits and the CI cost stays at zero.
        run: npm run eval

      - name: Build
        run: npm run build
        env:
          # Build runs without Cloudflare bindings. The build is allowed to
          # complete with secrets absent; runtime callers throw if they need
          # a missing key. Placeholder kept for clarity.
          NEXT_TELEMETRY_DISABLED: '1'
