# Alzhal - Cloudflare Workers configuration
#
# This file is the PUBLIC template. Real production IDs live in
# wrangler.private.toml (gitignored). To deploy your own instance:
#
#   1. Create the D1 databases and R2 bucket in your Cloudflare account:
#        npx wrangler d1 create alzhal-app
#        npx wrangler d1 create alzhal-food
#        npx wrangler d1 create alzhal-nutrition
#        npx wrangler d1 create alzhal-meta
#        npx wrangler d1 create alzhal-ingredients-ref
#        npx wrangler r2 bucket create alzhal-audio
#
#   2. Copy the printed database_id values into this file, replacing every
#      "REPLACE_WITH_YOUR_D1_DATABASE_ID" below.
#
#   3. Set your secrets:
#        npx wrangler secret put GEMINI_API_KEY
#        npx wrangler secret put WHATSAPP_TOKEN
#        npx wrangler secret put WHATSAPP_APP_SECRET
#        npx wrangler secret put TELEGRAM_BOT_TOKEN
#
#   4. Deploy:
#        npm run deploy

name = "alzhal"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[r2_buckets]]
bucket_name = "alzhal-audio"
binding = "AUDIO_BUCKET"

[[d1_databases]]
binding = "APP_DB"
database_name = "alzhal-app"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[d1_databases]]
binding = "FOOD_DB"
database_name = "alzhal-food"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[d1_databases]]
binding = "FOOD_NUTRITION_DB"
database_name = "alzhal-nutrition"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[d1_databases]]
binding = "FOOD_META_DB"
database_name = "alzhal-meta"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[d1_databases]]
binding = "INGREDIENTS_REF_DB"
database_name = "alzhal-ingredients-ref"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[ai]
binding = "AI"

[vars]
NODE_ENV = "production"
WHATSAPP_PHONE_NUMBER_ID = "your_phone_number_id"
NEXT_PUBLIC_APP_URL = "http://localhost:3000"
USE_GROUNDED_RENDERER = "true"
RENDERER_BACKEND = "gemma"
RENDERER_MODEL = "@cf/google/gemma-4-26b-a4b-it"

# Add your custom domain (optional):
# [[custom_domains]]
# hostname = "your-domain.example.com"

# Scheduled jobs. Wrangler will invoke /__scheduled which OpenNext routes by
# matching cron expressions to your cron route handlers (here, /api/cron/*).
# Hourly sweeps catch expired TTS audio so R2 doesn't grow unbounded.
# The fda-sync cron is daily; bump cadence if your ingredient set is huge.
[triggers]
crons = [
  "0 * * * *",   # /api/cron/audio-sweep — every hour
  "0 3 * * *",   # /api/cron/fda-sync     — once a day at 03:00 UTC
]
