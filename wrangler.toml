name = "sage-insight"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[r2_buckets]]
bucket_name = "consumer-truth-audio"
binding = "AUDIO_BUCKET"

[[d1_databases]]
binding = "APP_DB"
database_name = "consumer-truth-app"
database_id = "d192e561-9414-4d42-b589-165981e22a3c"

[[d1_databases]]
binding = "FOOD_DB"
database_name = "consumer-truth-food"
database_id = "55a42a68-a2fd-4653-8d82-f8947a750ebf"

[[d1_databases]]
binding = "FOOD_NUTRITION_DB"
database_name = "consumer-truth-nutrition"
database_id = "be4abefd-e638-4d28-bcfb-f42bdf5a139b"

[[d1_databases]]
binding = "FOOD_META_DB"
database_name = "consumer-truth-meta"
database_id = "1c449560-9160-4442-bc77-a2b12473f284"

[ai]
binding = "AI"

[vars]
NODE_ENV = "production"
WHATSAPP_PHONE_NUMBER_ID = "your_phone_number_id"
NEXT_PUBLIC_APP_URL = "https://sage-insight.cloudsequrity.com"

[[custom_domains]]
hostname = "sage-insight.cloudsequrity.com"
